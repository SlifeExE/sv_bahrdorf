[pretix]
instance_name=Schützenfest Bahrdorf
url=https://schuetzenfest.dawntale.eu
currency=EUR
datadir=/data

[database]
backend=postgresql
name=pretix
user=pretix
password=${PRETIX_DB_PASSWORD}
host=db

[redis]
location=redis://redis/0
sessions=true

[mail]
from=noreply@dawntale.eu
host=DEIN_SMTP_HOST
user=DEIN_SMTP_USER
password=DEIN_SMTP_PASSWORT
port=587
tls=on
