[pretix]
instance_name=Schützenfest Bahrdorf
url=https://fest.svbahrdorf.de/tickets
currency=EUR
datadir=/data
trust_x_forwarded_for = on
allowed_hosts=tickets.svbahrdorf.de,fest.svbahrdorf.de

[database]
backend=postgresql
name=pretix
user=pretix
password=${PRETIX_DB_PASSWORD}
host=db

[redis]
location=redis://redis/0
sessions=true

[mail]
from=noreply@dawntale.eu
host=DEIN_SMTP_HOST
user=DEIN_SMTP_USER
password=DEIN_SMTP_PASSWORT
port=587
tls=on

[frontend]
x_frame_options = ALLOW
cors_urls = https://fest.svbahrdorf.de